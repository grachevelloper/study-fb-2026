<div class="card">
  <h2 class="card__title">Добавить задачу</h2>
  <form id="note-form" class="note-form">
    <input
      id="note-input"
      class="input"
      type="text"
      maxlength="120"
      placeholder="Например: Просто сделай это!"
      autocomplete="off"
      required
    />
    <button class="button button--primary" type="submit">Добавить</button>
  </form>
</div>

<div class="card">
  <h2 class="card__title">Добавить с напоминанием</h2>
  <form id="reminder-form" class="note-form note-form--reminder">
    <input
      id="reminder-text"
      class="input"
      type="text"
      maxlength="120"
      placeholder="Текст напоминания"
      autocomplete="off"
      required
    />
    <input
      id="reminder-time"
      class="input"
      type="datetime-local"
      required
    />
    <button class="button button--success" type="submit">Добавить с напоминанием</button>
  </form>
</div>

<div class="card">
  <div class="card__header">
    <h2 class="card__title">Задачи</h2>
    <button id="clear-completed-btn" class="button button--secondary button--small" type="button">
      Удалить выполненные
    </button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn filter-btn--active" data-filter="all" type="button">Все</button>
    <button class="filter-btn" data-filter="active" type="button">Активные</button>
    <button class="filter-btn" data-filter="completed" type="button">Выполненные</button>
  </div>

  <p id="task-stats" class="task-stats">Всего: 0 | Активных: 0 | Выполненных: 0</p>

  <ul id="notes-list" class="task-list"></ul>
</div>
