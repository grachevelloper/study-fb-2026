<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Офлайн — TODO PWA</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #e5e7eb;
        background: linear-gradient(180deg, #020617 0%, #06112b 50%, #020617 100%);
      }

      .card {
        max-width: 440px;
        width: calc(100% - 40px);
        padding: 40px 36px;
        border: 1px solid rgba(148, 163, 184, 0.14);
        border-radius: 24px;
        background: rgba(10, 18, 35, 0.9);
        backdrop-filter: blur(10px);
        text-align: center;
      }

      .icon { font-size: 56px; margin-bottom: 20px; display: block; }

      h1 { font-size: 26px; color: #f8fafc; margin-bottom: 12px; }

      p { color: #94a3b8; line-height: 1.7; margin-bottom: 24px; }

      a {
        display: inline-block;
        padding: 14px 28px;
        border-radius: 14px;
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        color: white;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="icon">📡</span>
      <h1>Нет подключения к сети</h1>
      <p>Проверьте соединение и попробуйте снова. Ваши задачи сохранены в localStorage и никуда не пропадут.</p>
      <a href="./index.html">Вернуться на главную</a>
    </div>
  </body>
</html>
