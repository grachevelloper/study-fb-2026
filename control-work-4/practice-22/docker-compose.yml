services:
  backend1:
    build: .
    container_name: practice-22-backend-1
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-1
    ports:
      - "3000:3000"

  backend2:
    build: .
    container_name: practice-22-backend-2
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-2
    ports:
      - "3001:3000"

  backend3:
    build: .
    container_name: practice-22-backend-3
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-3-backup
    ports:
      - "3002:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: practice-22-nginx
    profiles:
      - nginx
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  haproxy:
    image: haproxy:3.0-alpine
    container_name: practice-22-haproxy
    profiles:
      - haproxy
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "8081:80"
      - "8404:8404"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
