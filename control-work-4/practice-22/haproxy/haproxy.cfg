global
  log stdout format raw local0

defaults
  log global
  mode http
  option httplog
  option dontlognull
  timeout connect 5s
  timeout client 30s
  timeout server 30s

frontend http_front
  bind *:80
  default_backend http_back

backend http_back
  balance roundrobin
  option httpchk GET /health
  http-check expect status 200
  server backend1 backend1:3000 check
  server backend2 backend2:3000 check
  server backend3 backend3:3000 check backup

listen stats
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 5s
