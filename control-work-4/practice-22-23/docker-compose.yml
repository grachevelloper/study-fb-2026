services:
  backend1:
    build: .
    container_name: practice-22-backend-1
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-1
    networks:
      - app-network

  backend2:
    build: .
    container_name: practice-22-backend-2
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-2
    networks:
      - app-network

  backend3:
    build: .
    container_name: practice-22-backend-3
    environment:
      PORT: 3000
      INSTANCE_NAME: backend-3-backup
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: practice-22-nginx
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network

  haproxy:
    image: haproxy:3.0-alpine
    container_name: practice-22-haproxy
    profiles:
      - haproxy
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "8081:80"
      - "8404:8404"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
